server:
  port: 8082

spring:
  application:
    name: order

  datasource:
    url: jdbc:postgresql://localhost:5433/order_db
    username: order_user
    password: order_pass

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 5
      properties:
        enable.idempotence: true
        spring.json.type.mapping: "OrderCreated:com.service.common.events.OrderCreatedPayload,PaymentCompleted:com.service.common.events.PaymentCompletedPayload,PaymentFailed:com.service.common.events.PaymentFailedPayload"

    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.value.default.type: com.service.common.events.EventEnvelope
        spring.json.use.type.info.headers: true
        spring.json.type.mapping: "OrderCreated:com.service.common.events.OrderCreatedPayload,PaymentCompleted:com.service.common.events.PaymentCompletedPayload,PaymentFailed:com.service.common.events.PaymentFailedPayload"

    listener:
      ack-mode: manual

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
