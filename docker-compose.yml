name: microservice-example

x-app-common: &app-common
  image: gradle:9.3.0-jdk21
  working_dir: /workspace
  volumes:
    - .:/workspace
  environment:
    GRADLE_USER_HOME: /home/gradle/.gradle
  restart: unless-stopped

services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  order-db:
    image: postgres:16
    container_name: order-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  payment-db:
    image: postgres:16
    container_name: payment-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_pass
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  registry:
    <<: *app-common
    container_name: registry
    command: ["gradle", "--no-daemon", ":registry:bootRun"]
    ports:
      - "8761:8761"
    volumes:
      - .:/workspace
      - registry-project-cache:/workspace/.gradle
      - registry-gradle-cache:/home/gradle/.gradle

  gateway:
    <<: *app-common
    container_name: gateway
    command: ["gradle", "--no-daemon", ":gateway:bootRun"]
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - gateway-project-cache:/workspace/.gradle
      - gateway-gradle-cache:/home/gradle/.gradle
    depends_on:
      kafka:
        condition: service_healthy
      registry:
        condition: service_started

    environment:
      GRADLE_USER_HOME: /home/gradle/.gradle
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry:8761/eureka
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  order:
    <<: *app-common
    container_name: order
    command: ["gradle", "--no-daemon", ":order:bootRun"]
    ports:
      - "8082:8082"
    volumes:
      - .:/workspace
      - order-project-cache:/workspace/.gradle
      - order-gradle-cache:/home/gradle/.gradle
    depends_on:
      kafka:
        condition: service_healthy
      order-db:
        condition: service_healthy
      registry:
        condition: service_started
    environment:
      GRADLE_USER_HOME: /home/gradle/.gradle
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/order_db
      SPRING_DATASOURCE_USERNAME: order_user
      SPRING_DATASOURCE_PASSWORD: order_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  payment:
    <<: *app-common
    container_name: payment
    command: ["gradle", "--no-daemon", ":payment:bootRun"]
    ports:
      - "8083:8083"
    volumes:
      - .:/workspace
      - payment-project-cache:/workspace/.gradle
      - payment-gradle-cache:/home/gradle/.gradle
    depends_on:
      kafka:
        condition: service_healthy
      payment-db:
        condition: service_healthy
      registry:
        condition: service_started
    environment:
      GRADLE_USER_HOME: /home/gradle/.gradle
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://registry:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:postgresql://payment-db:5432/payment_db
      SPRING_DATASOURCE_USERNAME: payment_user
      SPRING_DATASOURCE_PASSWORD: payment_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      gateway:
        condition: service_started
      order:
        condition: service_started
      payment:
        condition: service_started
      registry:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  order_db_data:
  payment_db_data:
  registry-project-cache:
  gateway-project-cache:
  order-project-cache:
  payment-project-cache:
  registry-gradle-cache:
  gateway-gradle-cache:
  order-gradle-cache:
  payment-gradle-cache:
  prometheus_data:
  grafana_data:
