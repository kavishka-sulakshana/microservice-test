global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8080']

  - job_name: order
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['order:8082']

  - job_name: payment
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment:8083']

  - job_name: registry
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['registry:8761']
